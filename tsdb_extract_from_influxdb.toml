# InfluxDB -> TSDB extraction config
# Empty mapping target ("") means this Influx field is discarded.
# Optional per-target scaling can be appended after a comma:
#   "measurement/field" = "target_series,*1000"
#   "measurement/field" = "target_series,/1000"
# Multiple targets remain supported:
#   "measurement/field" = "target_a,*1000,target_b,target_c,/1000"

[influxdb]
url = "http://192.168.1.14:8086"
database = "housedata"
